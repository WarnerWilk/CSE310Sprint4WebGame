<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>The Long Fall — Recon Prototype</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="heat">Heat: <span id="heatVal">0%</span></div>
    <div id="scans">Scans: <span id="scansVal">0/0</span></div>
    <div id="floor">Floor: <span id="floorVal">1</span></div>
    <div id="instr">Move: WASD / Arrow keys. Scan by standing in points.</div>
  </div>
  <div id="overlay" class="hidden"></div>
  <script src="game.js"></script>
</body>
</html>
