<!DOCTYPE html>
<html>
<head>
    <title>Accidental Demolition</title>
    <style>
        body { background: #0b0f19; color: #4af626; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 2px solid #1f3d22; background: #0d131a; }
    </style>
</head>
<body>
    <h1>ACCIDENTAL DEMOLITION</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.font = "18px Courier New";

        let gameState = "MENU";
        let currentLevel = 0;
        let player = { x: 50, y: 200, radius: 12, speed: 2.5 };
        let obstacles = [{ x: 220, y: 70, width: 60, height: 100 }, { x: 220, y: 230, width: 60, height: 100 }, { x: 580, y: 150, width: 60, height: 100 }];
        let guard = { x: 450, y: 200, radius: 12, angle: Math.PI/2, targetAngle: Math.PI/2, fov: Math.PI/1.8, viewDistance: 280, yPos: 200, dir: 1, pauseTimer: 0, rotationSpeed: 0.04 };
        let cameras = [];
        let objective = null;
        let goals = [];

        const keys = {};

        window.addEventListener("keydown", e => {
            const key = e.key;
            if (gameState === "MENU") {
                if (key === "1") loadLevel(0);
                if (key === "2") loadLevel(1);
                if (key === "3") loadLevel(2);
            } else if (key === "Escape") {
                gameState = "MENU";
            }

            keys[key.toLowerCase()] = true;
        });

        window.addEventListener("keyup", e => {
            keys[e.key.toLowerCase()] = false;
        });

        function loadLevel(index) {
            currentLevel = index;
            player.x = 50;
            player.y = 200;

            if (index === 0) {
                obstacles = [
                    { x: 220, y: 70, width: 60, height: 100 },
                    { x: 220, y: 230, width: 60, height: 100 },
                    { x: 580, y: 150, width: 60, height: 100 }
                ];
                cameras = [];
                objective = { x: 740, y: 200, radius: 18 };
                guard.yPos = 200;
                guard.dir = 1;
                guard.angle = Math.PI/2;
                guard.targetAngle = Math.PI/2;
                guard.pauseTimer = 0;
            } else if (index === 1) {
                obstacles = [
                    { x: 220, y: 120, width: 60, height: 160 },
                    { x: 520, y: 80, width: 60, height: 80 }
                ];
                cameras = [
                    { x: 650, y: 120, angle: Math.PI * 0.75, fov: Math.PI/3, viewDistance: 260 }
                ];
                objective = null;
                goals = [];
                guard.yPos = 200;
                guard.dir = 1;
                guard.angle = Math.PI/2;
                guard.pauseTimer = 0;
            } else if (index === 2) {
                obstacles = [
                    { x: 180, y: 70, width: 80, height: 100 },
                    { x: 180, y: 230, width: 80, height: 100 },
                    { x: 420, y: 140, width: 100, height: 100 },
                    { x: 620, y: 60, width: 80, height: 80 }
                ];
                cameras = [
                { 
                    x: 700, y: 80, 
                    angle: Math.PI * 0.75, 
                    fov: Math.PI / 6, // Narrowed from PI/3 to PI/6
                    viewDistance: 260,
                    minAngle: Math.PI * 0.5,  // Sweep boundary (90 degrees, looking down)
                    maxAngle: Math.PI * 1.0,  // Sweep boundary (180 degrees, looking left)
                    rotationSpeed: 0.015,     // How fast the camera turns
                    rotationDir: 1            // Initial turning direction
                },
                { 
                    x: 700, y: 320, 
                    angle: -Math.PI * 0.75, 
                    fov: Math.PI / 6, // Narrowed from PI/3 to PI/6
                    viewDistance: 260,
                    minAngle: -Math.PI * 1.0, // Sweep boundary (-180 degrees, looking left)
                    maxAngle: -Math.PI * 0.5, // Sweep boundary (-90 degrees, looking up)
                    rotationSpeed: 0.015,     // How fast the camera turns
                    rotationDir: -1           // Initial turning direction
                }
                ];
                objective = null;
                goals = [];
                placeLevel2Goals();
                guard.x = 450;
                guard.yPos = 90;
                guard.dir = 1;
                guard.angle = Math.PI/2;
                guard.targetAngle = Math.PI/2;
                guard.pauseTimer = 0;
            }

            gameState = "PLAYING";
        }

        function getLineIntersection(x1, y1, x2, y2, x3, y3, x4, y4) {
            const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
            if (denom === 0) return null;

            const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
            const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / denom;

            if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
                return {
                    x: x1 + t * (x2 - x1),
                    y: y1 + t * (y2 - y1)
                };
            }

            return null;
        }

        function castRay(sx, sy, angle, maxDist) {
            let closestDist = maxDist;
            let targetX = sx + Math.cos(angle) * maxDist;
            let targetY = sy + Math.sin(angle) * maxDist;

            obstacles.forEach(obs => {
                let lines = [
                    {p1: {x: obs.x, y: obs.y}, p2: {x: obs.x + obs.width, y: obs.y}},
                    {p1: {x: obs.x + obs.width, y: obs.y}, p2: {x: obs.x + obs.width, y: obs.y + obs.height}},
                    {p1: {x: obs.x, y: obs.y + obs.height}, p2: {x: obs.x + obs.width, y: obs.y + obs.height}},
                    {p1: {x: obs.x, y: obs.y}, p2: {x: obs.x, y: obs.y + obs.height}}
                ];

                lines.forEach(line => {
                    let intersect = getLineIntersection(sx, sy, targetX, targetY,
                        line.p1.x, line.p1.y, line.p2.x, line.p2.y);
                    if (intersect) {
                        let d = Math.hypot(intersect.x - sx, intersect.y - sy);
                        if (d < closestDist) closestDist = d;
                    }
                });
            });

            return {
                x: sx + Math.cos(angle) * closestDist,
                y: sy + Math.sin(angle) * closestDist,
                distance: closestDist
            };
        }

        function getVisionPolygon(sx, sy, angle, fov, viewDistance, steps = 36) {
            const points = [];
            for (let i = 0; i <= steps; i++) {
                const rayAngle = angle - fov / 2 + (fov * i) / steps;
                const ray = castRay(sx, sy, rayAngle, viewDistance);
                points.push(ray);
            }
            return points;
        }

        function isPointVisibleToCamera(cam, x, y) {
            const dx = x - cam.x;
            const dy = y - cam.y;
            const dist = Math.hypot(dx, dy);
            if (dist > cam.viewDistance) return false;

            const angleToPoint = Math.atan2(dy, dx);
            const deltaAngle = Math.abs(((angleToPoint - cam.angle + Math.PI) % (Math.PI * 2)) - Math.PI);
            if (deltaAngle > cam.fov / 2) return false;

            const ray = castRay(cam.x, cam.y, angleToPoint, cam.viewDistance);
            return ray.distance >= dist - 2;
        }

        function isVisibleToAnyCamera(x, y) {
            return cameras.some(cam => isPointVisibleToCamera(cam, x, y));
        }

        function placeLevel2Goals() {
            const candidates = [
                { x: 120, y: 100, radius: 14 },
                { x: 120, y: 300, radius: 14 },
                { x: 320, y: 60, radius: 14 },
                { x: 320, y: 340, radius: 14 },
                { x: 500, y: 305, radius: 14 },
                { x: 500, y: 75, radius: 14 },
                { x: 90, y: 200, radius: 14 },
                { x: 400, y: 250, radius: 14 },
                { x: 250, y: 200, radius: 14 },
                { x: 600, y: 200, radius: 14 },
                { x: 340, y: 170, radius: 14 },
                { x: 540, y: 260, radius: 14 }
            ];
            goals = candidates.filter(goal => !isVisibleToAnyCamera(goal.x, goal.y) && !isCollidingWithObstacles(goal.x, goal.y)).slice(0, 4);
            if (goals.length < 4) {
                goals = candidates.filter(goal => !isCollidingWithObstacles(goal.x, goal.y)).slice(0, 4);
            }
        }

        function circleRectCollision(cx, cy, r, rect) {
            const closestX = Math.max(rect.x, Math.min(cx, rect.x + rect.width));
            const closestY = Math.max(rect.y, Math.min(cy, rect.y + rect.height));
            return Math.hypot(cx - closestX, cy - closestY) < r;
        }

        function isCollidingWithObstacles(x, y) {
            return obstacles.some(obs => circleRectCollision(x, y, player.radius, obs));
        }

        function isGuardCollidingWithObstacles(x, y) {
            return obstacles.some(obs => circleRectCollision(x, y, guard.radius, obs));
        }

        function normalizeAngle(angle) {
            const full = Math.PI * 2;
            return ((angle + Math.PI) % full + full) % full - Math.PI;
        }

        function update() {
            if (gameState !== "PLAYING") return;
            
            const prevX = player.x;
            const prevY = player.y;

            // Movement (WASD)
            if (keys["w"]) player.y -= player.speed;
            if (keys["s"]) player.y += player.speed;
            if (keys["a"]) player.x -= player.speed;
            if (keys["d"]) player.x += player.speed;

            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            if (isCollidingWithObstacles(player.x, player.y)) {
                player.x = prevX;
                player.y = prevY;
            }

            if (currentLevel === 0 || currentLevel === 2) {
                if (guard.pauseTimer > 0) {
                    guard.pauseTimer -= 1;
                } else {
                    const nextY = guard.yPos + 1.5 * guard.dir;
                    const blockingObs = obstacles.find(obs => circleRectCollision(guard.x, nextY, guard.radius, obs));

                    if (blockingObs) {
                        const leftX = blockingObs.x - guard.radius - 2;
                        const rightX = blockingObs.x + blockingObs.width + guard.radius + 2;
                        const canLeft = leftX > guard.radius &&
                            !isGuardCollidingWithObstacles(leftX, guard.yPos) &&
                            !isGuardCollidingWithObstacles(leftX, nextY);
                        const canRight = rightX < canvas.width - guard.radius &&
                            !isGuardCollidingWithObstacles(rightX, guard.yPos) &&
                            !isGuardCollidingWithObstacles(rightX, nextY);

                        if (canLeft && canRight) {
                            guard.x = Math.abs(guard.x - leftX) < Math.abs(guard.x - rightX) ? leftX : rightX;
                            guard.yPos = nextY;
                        } else if (canLeft) {
                            guard.x = leftX;
                            guard.yPos = nextY;
                        } else if (canRight) {
                            guard.x = rightX;
                            guard.yPos = nextY;
                        } else {
                            guard.dir *= -1;
                            guard.pauseTimer = 20;
                        }
                    } else {
                        guard.yPos = nextY;
                    }
                }

                if (guard.yPos >= 320 && guard.dir === 1) {
                    guard.yPos = 320;
                    guard.dir = -1;
                    guard.targetAngle = -Math.PI / 2;
                    guard.pauseTimer = 40;
                } else if (guard.yPos <= 80 && guard.dir === -1) {
                    guard.yPos = 80;
                    guard.dir = 1;
                    guard.targetAngle = Math.PI / 2;
                    guard.pauseTimer = 40;
                }

                const angleDiff = normalizeAngle(guard.targetAngle - guard.angle);
                if (Math.abs(angleDiff) <= guard.rotationSpeed) {
                    guard.angle = guard.targetAngle;
                } else {
                    guard.angle += Math.sign(angleDiff) * guard.rotationSpeed;
                    guard.angle = normalizeAngle(guard.angle);
                }

                if (objective) {
                    let ox = player.x - objective.x;
                    let oy = player.y - objective.y;
                    let objectiveDist = Math.hypot(ox, oy);
                    if (objectiveDist <= player.radius + objective.radius) {
                        gameState = "WON";
                    }
                }

                if (currentLevel === 2) {
                    for (let i = goals.length - 1; i >= 0; i--) {
                        let gx = goals[i].x - player.x;
                        let gy = goals[i].y - player.y;
                        let goalDist = Math.hypot(gx, gy);
                        if (goalDist <= player.radius + goals[i].radius) {
                            goals.splice(i, 1);
                        }
                    }
                    if (goals.length === 0) {
                        gameState = "WON";
                    }
                }

                let dx = player.x - guard.x;
                let dy = player.y - guard.yPos;
                let dist = Math.hypot(dx, dy);

                if (dist < guard.viewDistance) {
                    let angleToPlayer = Math.atan2(dy, dx);
                    let deltaAngle = Math.abs(((angleToPlayer - guard.angle + Math.PI) % (Math.PI * 2)) - Math.PI);

                    if (deltaAngle <= guard.fov / 2) {
                        let ray = castRay(guard.x, guard.yPos, angleToPlayer, guard.viewDistance);
                        if (ray.distance >= dist - 2) {
                            player.x = 50;
                            player.y = 200;
                        }
                    }
                }
            } 
            if (currentLevel === 1 || currentLevel === 2) {
                cameras.forEach(cam => {
                    let dx = player.x - cam.x;
                    let dy = player.y - cam.y;
                    let dist = Math.hypot(dx, dy);

                    if (dist < cam.viewDistance) {
                        let angleToPlayer = Math.atan2(dy, dx);
                        let deltaAngle = Math.abs(((angleToPlayer - cam.angle + Math.PI) % (Math.PI * 2)) - Math.PI);

                        if (deltaAngle <= cam.fov / 2) {
                            let ray = castRay(cam.x, cam.y, angleToPlayer, cam.viewDistance);
                            if (ray.distance >= dist - 2) {
                                player.x = 50;
                                player.y = 200;
                            }
                        }
                    }
                });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState === "MENU") {
                ctx.fillStyle = "#fff";
                ctx.fillText("MAIN MENU: [1] GUARD TUTORIAL | [2] CAMERA ARCHIVE | [3] MULTI-GOAL LEVEL", 120, 200);
            } else if (gameState === "WON") {
                ctx.fillStyle = "#4af626";
                ctx.fillText("LEVEL COMPLETE! Press ESC to return to menu.", 180, 200);
            } else {
                // Draw Obstacles
                ctx.fillStyle = "#1e293b";
                obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.width, o.height));

                // Draw Guard Vision Cone (The indicator)
                if (currentLevel === 0 || currentLevel === 2) {
                    if (currentLevel === 0 && objective) {
                        ctx.fillStyle = "rgba(0, 200, 255, 0.5)";
                        ctx.beginPath();
                        ctx.arc(objective.x, objective.y, objective.radius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = "#00c8ff";
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(objective.x, objective.y, objective.radius + 4, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    if (currentLevel === 2 && goals.length > 0) {
                        goals.forEach(goal => {
                            ctx.fillStyle = "rgba(0, 200, 255, 0.5)";
                            ctx.beginPath();
                            ctx.arc(goal.x, goal.y, goal.radius, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.strokeStyle = "#00c8ff";
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(goal.x, goal.y, goal.radius + 4, 0, Math.PI * 2);
                            ctx.stroke();
                        });
                    }

                    const guardVision = getVisionPolygon(guard.x, guard.yPos, guard.angle, guard.fov, guard.viewDistance, 60);
                    ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
                    ctx.beginPath();
                    ctx.moveTo(guard.x, guard.yPos);
                    guardVision.forEach(point => ctx.lineTo(point.x, point.y));
                    ctx.closePath();
                    ctx.fill();

                    // Draw Guard
                    ctx.fillStyle = "red";
                    ctx.beginPath(); ctx.arc(guard.x, guard.yPos, 12, 0, Math.PI*2); ctx.fill();
                }

                if (currentLevel === 1 || currentLevel === 2) {
                    cameras.forEach(cam => {
                        ctx.fillStyle = "yellow";
                        ctx.fillRect(cam.x - 8, cam.y - 8, 16, 16);

                        const cameraVision = getVisionPolygon(cam.x, cam.y, cam.angle, cam.fov, cam.viewDistance, 40);
                        ctx.fillStyle = "rgba(255, 255, 0, 0.2)";
                        ctx.beginPath();
                        ctx.moveTo(cam.x, cam.y);
                        cameraVision.forEach(point => ctx.lineTo(point.x, point.y));
                        ctx.closePath();
                        ctx.fill();
                    });
                }

                // Draw Player
                ctx.fillStyle = "#4af626";
                ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = "#fff";
                ctx.fillText("ESC to Menu", 10, 390);
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
